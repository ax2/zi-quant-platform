<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ZiQuant Platform</title>
  <style>
    :root{color-scheme:light;--bg:#f5f7fb;--side:#0f172a;--side2:#111c33;--text:#172033;--muted:#64748b;--line:#dde4ef;--card:#fff;--blue:#2563eb;--cyan:#0891b2;--green:#16a34a;--red:#dc2626;--amber:#d97706;--violet:#7c3aed;--shadow:0 14px 38px rgba(15,23,42,.08)}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.app{display:grid;grid-template-columns:280px 1fr;min-height:100vh}
    aside{background:linear-gradient(180deg,var(--side),var(--side2));color:#dbeafe;padding:18px 14px;position:sticky;top:0;height:100vh;overflow:auto}.brand{display:flex;align-items:center;gap:10px;padding:8px 8px 18px}.logo{width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,#60a5fa,#22d3ee);box-shadow:0 0 0 6px rgba(96,165,250,.12)}.brand b{font-size:17px}.brand span{display:block;color:#93a4bd;font-size:12px;margin-top:2px}
    .group{margin:8px 0 14px}.group-title{font-size:11px;text-transform:uppercase;color:#7f90aa;letter-spacing:.08em;margin:12px 10px 6px}.nav button{width:100%;display:flex;align-items:center;gap:10px;height:36px;border:0;background:transparent;color:#b8c4d8;border-radius:8px;padding:0 10px;font-weight:650;text-align:left;cursor:pointer}.nav button:hover,.nav button.active{background:rgba(148,163,184,.16);color:#fff}.dot{width:7px;height:7px;border-radius:999px;background:#64748b}.active .dot{background:#38bdf8}
    main{padding:22px 26px 40px}.top{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;margin-bottom:18px}.crumb{color:var(--muted);font-size:13px;margin-bottom:6px}.title h1{font-size:28px;line-height:1.1;margin:0 0 8px}.title p{margin:0;color:var(--muted);max-width:860px}.toolbar{display:flex;gap:10px;align-items:end;flex-wrap:wrap}.field{display:grid;gap:5px;font-size:12px;color:var(--muted)}.field input,.field select{height:36px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--text);padding:0 10px;min-width:120px}.btn{height:36px;border:0;border-radius:8px;background:var(--blue);color:white;font-weight:760;padding:0 14px;box-shadow:0 8px 18px rgba(37,99,235,.22);cursor:pointer}.btn.secondary{background:#fff;color:var(--text);border:1px solid var(--line);box-shadow:none}
    .grid{display:grid;gap:14px}.kpis{grid-template-columns:repeat(6,minmax(0,1fr));margin-bottom:14px}.card{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:16px;box-shadow:var(--shadow)}.k{color:var(--muted);font-size:12px}.v{font-size:24px;font-weight:800;margin-top:7px}.sub{font-size:12px;color:var(--muted);margin-top:4px}.layout{grid-template-columns:1.25fr .75fr}.section-title{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}.section-title h2{margin:0;font-size:16px}.muted{color:var(--muted)}.small{font-size:12px}.tag{display:inline-flex;align-items:center;gap:5px;border-radius:999px;padding:4px 9px;font-size:12px;font-weight:700;background:#eef2ff;color:#3730a3}.tag.green{background:#dcfce7;color:#166534}.tag.red{background:#fee2e2;color:#991b1b}.tag.amber{background:#fef3c7;color:#92400e}.tag.gray{background:#f1f5f9;color:#475569}
    .bars{display:grid;gap:10px}.bar{display:grid;grid-template-columns:88px 1fr 42px;gap:10px;align-items:center}.track{height:10px;background:#e8eef7;border-radius:999px;overflow:hidden}.fill{height:100%;background:linear-gradient(90deg,#2563eb,#06b6d4)}table{width:100%;border-collapse:collapse}th,td{text-align:left;border-bottom:1px solid #edf2f7;padding:10px 8px;font-size:13px;vertical-align:top}th{font-size:12px;color:var(--muted);font-weight:760}.split{display:grid;grid-template-columns:1fr 1fr;gap:14px}.list{display:grid;gap:10px}.item{border:1px solid var(--line);border-radius:8px;padding:12px;background:#fbfdff}.item b{font-size:14px}.tabs{display:flex;gap:8px;margin-bottom:12px}.tab{border:1px solid var(--line);background:#fff;border-radius:999px;height:30px;padding:0 11px;color:var(--muted);font-weight:700}.tab.active{background:#e0f2fe;color:#075985;border-color:#bae6fd}.panel{display:none}.panel.active{display:block}.form-row{display:flex;gap:10px;flex-wrap:wrap}.json{max-height:340px;overflow:auto;background:#0b1220;color:#cbd5e1;border-radius:8px;padding:12px;font-size:12px}.status{display:inline-flex;width:8px;height:8px;border-radius:99px;background:#94a3b8}.status.ok{background:#16a34a}.status.warn{background:#d97706}
    @media(max-width:1180px){.kpis{grid-template-columns:repeat(3,1fr)}.layout,.split{grid-template-columns:1fr}}@media(max-width:860px){.app{grid-template-columns:1fr}aside{height:auto;position:relative}.kpis{grid-template-columns:1fr 1fr}.top{display:grid}}
  </style>
</head>
<body>
<div class="app">
  <aside>
    <div class="brand"><div class="logo"></div><div><b>ZiQuant</b><span>A股量化交易平台</span></div></div>
    <nav class="nav">
      <div class="group"><div class="group-title">总览</div><button class="active" data-page="overview"><i class="dot"></i>工作台</button><button data-page="radar"><i class="dot"></i>雷达与告警</button></div>
      <div class="group"><div class="group-title">研究</div><button data-page="stocks"><i class="dot"></i>股票与股票池</button><button data-page="factors"><i class="dot"></i>因子实验室</button><button data-page="strategies"><i class="dot"></i>策略中心</button><button data-page="optimize"><i class="dot"></i>策略优化</button></div>
      <div class="group"><div class="group-title">执行</div><button data-page="backtest"><i class="dot"></i>回测中心</button><button data-page="paper"><i class="dot"></i>模拟盘</button><button data-page="market"><i class="dot"></i>智能与市场</button></div>
      <div class="group"><div class="group-title">管理</div><button data-page="sources"><i class="dot"></i>数据源管理</button><button data-page="ops"><i class="dot"></i>任务与运维</button><button data-page="users"><i class="dot"></i>用户与权限</button></div>
    </nav>
  </aside>
  <main>
    <div class="top">
      <div class="title"><div class="crumb" id="crumb">总览 / 工作台</div><h1 id="pageTitle">工作台</h1><p id="pageDesc">A 股股票池、因子、策略、雷达、模拟盘和数据源运维集中在一个可审计工作台。</p></div>
      <div class="toolbar"><label class="field">股票池<select id="poolFilter"><option>公共 A 股 500</option><option>研究员新能源观察池</option></select></label><label class="field">数据源<select id="sourceFilter"><option>QVeris 数据接口</option><option>Tushare</option><option>同花顺</option></select></label><button class="btn" id="refreshBtn">刷新扫描</button><button class="btn secondary" id="rebuildBtn">按策略重建股票池</button><button class="btn secondary" onclick="setApiToken()">API Token</button><button class="btn secondary" onclick="syncStockUniverse()">同步股票池</button><button class="btn secondary" onclick="prepareSource()">准备数据源</button><button class="btn secondary" onclick="strictSyncBars()">严格真实同步</button><button class="btn secondary" onclick="bootstrapRealData()">真实数据引导</button><button class="btn secondary" onclick="syncFinancials()">同步财报</button><button class="btn secondary" onclick="loadCoverage()">行情覆盖</button></div>
    </div>
    <section class="grid kpis" id="kpis"></section>
    <p class="small muted" id="sourceResult"></p>
    <section class="panel active" id="overview"></section>
    <section class="panel" id="radar"></section>
    <section class="panel" id="stocks"></section>
    <section class="panel" id="factors"></section>
    <section class="panel" id="strategies"></section>
    <section class="panel" id="optimize"></section>
    <section class="panel" id="backtest"></section>
    <section class="panel" id="paper"></section>
    <section class="panel" id="market"></section>
    <section class="panel" id="sources"></section>
    <section class="panel" id="ops"></section>
    <section class="panel" id="users"></section>
  </main>
</div>
<script>
const $=id=>document.getElementById(id); let DATA=null, ME=null, API_TOKEN=localStorage.getItem('zi_api_token')||'';
const titles={overview:['总览 / 工作台','工作台','集中查看股票池、因子策略、雷达信号和模拟盘风险。'],radar:['总览 / 雷达与告警','雷达与告警','盘中扫描、信号等级和去重策略。'],stocks:['研究 / 股票与股票池','股票与股票池','维护公共和用户私有股票池，并按策略重建。'],factors:['研究 / 因子实验室','因子实验室','管理 MACD、RSI、质量动量等因子定义和结果。'],strategies:['研究 / 策略中心','策略中心','策略参数、状态、公共/私有权限和风控规则。'],optimize:['研究 / 策略优化','策略优化','调用大模型或本地规则生成参数调整和实验建议。'],backtest:['执行 / 回测中心','回测中心','历史行情落库、策略回放、交易明细和评价指标。'],paper:['执行 / 模拟盘','模拟盘','纸面交易账户、订单、手续费和风险约束。'],market:['执行 / 智能与市场','智能与市场','市场解释、参考项目和 qstock 六层结构分析。'],sources:['管理 / 数据源管理','数据源管理','QVeris 数据接口、Tushare、同花顺接口配置。'],ops:['管理 / 任务与运维','任务与运维','同步任务、健康检查、调度和运行状态。'],users:['管理 / 用户与权限','用户与权限','多用户、角色、公共/私有资源和审计。']};
function fmt(n){return new Intl.NumberFormat('zh-CN',{maximumFractionDigits:2}).format(n)}
function tag(text, cls='gray'){return `<span class="tag ${cls}">${text}</span>`}
function pct(v){return v==null?'-':(Number(v)*100).toFixed(2)+'%'}
function repairActionLabel(action){return ({remediate_health:'执行修复',alpha_search:'开始搜索',tighten_signal_quality:'生成建议',run_backtest:'运行回测',loosen_or_expand_universe:'检查覆盖',paper_observe:'生成建议'}[action]||'查看')}
function repairActionEnabled(action){return ['remediate_health','alpha_search','tighten_signal_quality','run_backtest','loosen_or_expand_universe','paper_observe'].includes(action)}
function renderStrategyHealth(h){h=h||{};const m=h.metrics||{},s=h.strategy||{},b=h.backtest||{},plan=h.repair_plan||[],e=h.effectiveness_evidence||{};const cls=h.status==='ready'?'green':h.status==='rejected'?'red':'amber';const reasons=(h.reasons&&h.reasons.length)?h.reasons.join('；'):'最近回测、Alpha、样本外和稳定性均满足当前准入门槛';const evidenceHtml=e.verdict?`<div class="item" style="margin-top:10px"><b>有效性证据</b> ${tag(e.verdict,e.passed?'green':'amber')} ${tag(e.confidence||'unknown',e.confidence==='high'?'green':e.confidence==='low'?'amber':'gray')}<p class="small muted">${e.summary||''}</p><p class="small muted">证据：${(e.strengths||[]).join('；')||'-'}</p><p class="small muted">剩余风险：${(e.residual_risks||[]).join('；')||'继续模拟盘观察'}</p></div>`:'';const planHtml=plan.length?`<div class="list" style="margin-top:10px">${plan.slice(0,3).map((x,i)=>`<div class="item"><b>${x.title}</b> ${tag(x.priority,x.priority==='critical'?'red':x.priority==='high'?'amber':'gray')}<p class="small muted">${x.detail}</p><div class="form-row"><button class="btn secondary" ${repairActionEnabled(x.action)?`onclick="runRepairAction(${i})"`:'disabled'}>${repairActionLabel(x.action)}</button><span class="small muted">${x.endpoint||''}</span></div></div>`).join('')}</div>`:'';return `<div class="card" style="margin-bottom:14px"><div class="section-title"><h2>启用策略健康度</h2>${tag(h.status||'unknown',cls)}</div><div class="grid kpis" style="margin-bottom:10px"><div class="item"><b>${s.name||'无启用策略'}</b><p class="small muted">${s.id||'-'}</p></div><div class="item"><div class="k">Alpha</div><div class="v">${pct(m.alpha_return)}</div><div class="sub">基准 ${pct(m.benchmark_return)}</div></div><div class="item"><div class="k">样本外 Alpha</div><div class="v">${pct(m.out_of_sample_alpha_return)}</div><div class="sub">收益 ${pct(m.out_of_sample_return)}</div></div><div class="item"><div class="k">Sharpe / 回撤</div><div class="v">${m.sharpe==null?'-':m.sharpe}</div><div class="sub">回撤 ${pct(m.max_drawdown)}</div></div></div><p class="small muted">最近回测：${b.name||'-'} · ${b.end_date||'-'} · 交易 ${m.trade_count??'-'} 笔 · 分段稳定 ${m.walk_forward_passed===false?'未通过':'通过/待验证'} · 样本外 ${m.out_of_sample_passed===false?'未通过':'通过/待验证'}</p><p>${reasons}</p>${evidenceHtml}${planHtml}</div>`}
function authHeaders(headers={}){const out={...headers};if(API_TOKEN)out['X-Zi-Api-Token']=API_TOKEN;return out}
async function ziFetch(url, options={}){const r=await fetch(url,{...options,headers:authHeaders(options.headers||{})});if(r.status===401){const el=$('sourceResult');if(el)el.textContent='API Token 缺失或不正确，请点击右上角 API Token 设置后重试。'}return r}
async function adminFetch(url, options={}){return ziFetch(url,{...options,headers:{'X-Zi-User-Email':'admin@local.zicode',...(options.headers||{})}})}
function setApiToken(){const v=prompt('API Token',API_TOKEN);if(v!==null){API_TOKEN=v.trim();localStorage.setItem('zi_api_token',API_TOKEN);const el=$('sourceResult');if(el)el.textContent=API_TOKEN?'API Token 已保存到当前浏览器。':'API Token 已清空。'}}
async function load(){const [r,u]=await Promise.all([fetch('/api/dashboard'),fetch('/api/users/me')]); DATA=await r.json(); ME=await u.json(); render(); }
function renderKpis(){const k=DATA.kpis;$('kpis').innerHTML=[['股票',k.stocks,'内置 A 股池'],['行情K线',k.bars,'已落库'],['财报',k.financial_reports,'覆盖 '+(k.financial_symbols||0)+' 股'],['股票池',k.pools,'公共 + 私有'],['策略',k.strategies,'启用/草稿'],['回测',k.backtests,'运行记录'],['优化',k.optimizations,'建议记录'],['实验',k.experiments||0,'准入验证'],['模拟资金','¥'+fmt(k.paper_cash),'纸面账户'],['最大回撤',(k.max_drawdown*100).toFixed(2)+'%','风险预估']].map(x=>`<div class="card"><div class="k">${x[0]}</div><div class="v">${x[1]}</div><div class="sub">${x[2]}</div></div>`).join('')}
function recommendationCard(item){const e=item.evidence||{},risk=item.risk_control||{};return `<div class="item"><div class="section-title"><b>${item.rank}. ${item.name} ${item.symbol}</b>${tag(item.action,item.action==='BUY_WATCH'?'red':item.action==='OBSERVE'?'amber':'gray')}</div><p>${item.reason}</p><p class="small muted">${(item.strategy_tags||[]).join(' / ')} · 价格 ${item.price} · 分数 ${item.score} · 置信度 ${item.confidence}</p><p class="small muted">动量 ${(Number(e.momentum_20d||0)*100).toFixed(2)}% · RSI ${e.rsi??'-'} · 质量 ${e.quality??'-'} · 波动 ${(Number(e.volatility_20d||0)*100).toFixed(2)}% · 单票观察仓位 ${(Number(risk.suggested_max_position_pct||0)*100).toFixed(0)}%</p></div>`}
function reviewCard(item){const r=item.review||{};const cls=r.result==='hit'?'green':r.result==='miss'?'red':'gray';return `<div class="item"><div class="section-title"><b>${item.name} ${item.symbol}</b>${tag(r.result||'missing',cls)}</div><p class="small muted">昨日动作 ${item.action} · 昨收 ${r.previous_close??'-'} · 最新 ${r.latest_close??'-'} · 次日 ${(r.next_day_return==null?'-':(r.next_day_return*100).toFixed(2)+'%')}</p></div>`}
function renderRecommendationDashboard(){const rec=DATA.realtime_recommendations||{},review=DATA.yesterday_review||{},summary=review.summary||{};return `<div class="grid layout"><div class="card"><div class="section-title"><h2>实时股票推荐</h2><div class="form-row">${tag(rec.status||'unknown',rec.status==='ready'?'green':'amber')}<button class="btn secondary" onclick="refreshRecommendationPanel()">刷新</button><button class="btn secondary" onclick="sendFeishuSignal(true)">飞书预览</button></div></div><div class="list" id="recommendationList">${(rec.recommendations||[]).slice(0,8).map(recommendationCard).join('')||'<div class="item muted">暂无推荐，请先同步行情并刷新因子。</div>'}</div></div><div class="card"><div class="section-title"><h2>昨日推荐复盘</h2>${tag(review.status||'unknown',review.status==='ready'?'green':'amber')}</div><p class="small muted">${review.recommendation_date||'-'} -> ${review.review_date||'-'} · 命中 ${summary.hit_count??'-'}/${summary.reviewed??'-'} · 平均收益 ${summary.avg_next_day_return==null?'-':(summary.avg_next_day_return*100).toFixed(2)+'%'}</p><div class="list" id="reviewList">${(review.items||[]).slice(0,6).map(reviewCard).join('')||'<div class="item muted">缺少至少两个真实交易日，暂无法复盘。</div>'}</div></div></div><div class="card" style="margin-top:14px"><div class="section-title"><h2>输入股票分析</h2>${tag('策略问股','green')}</div><div class="form-row"><input id="analysisSymbol" value="600519.SH" style="height:36px;border:1px solid var(--line);border-radius:8px;padding:0 10px;min-width:160px"><button class="btn" onclick="analyzeStock()">分析</button><button class="btn secondary" onclick="runResearchNext()">运行策略研究</button></div><div id="stockAnalysisResult" class="list" style="margin-top:12px"><div class="item muted">输入 A 股代码后，会基于真实行情、财报质量、技术因子和策略标签生成分析。</div></div></div>`}
function renderOverview(){$('overview').innerHTML=`${renderRecommendationDashboard()}${renderStrategyHealth(DATA.strategy_health)}${renderOptimizationHealth(DATA.strategy_optimization_loop)}${renderPortfolioHealth(DATA.portfolio_health)}`}
function signalsTable(rows){return `<table><thead><tr><th>股票</th><th>动作</th><th>价格</th><th>分数</th><th>理由</th></tr></thead><tbody>${rows.map(s=>`<tr><td><b>${s.name}</b><div class="small muted">${s.symbol}</div></td><td>${tag(s.action,s.action==='BUY_WATCH'?'red':'gray')}</td><td>${s.price}</td><td>${s.score}</td><td>${s.reason}</td></tr>`).join('')}</tbody></table>`}
function renderSimpleTables(){ $('radar').innerHTML=`<div class="card"><div class="section-title"><h2>雷达队列</h2>${tag('已去重','green')}</div>${signalsTable(DATA.radar)}</div>`; $('stocks').innerHTML=`<div class="split"><div class="card"><div class="section-title"><h2>股票样本</h2><button class="btn secondary">导入 CSV</button></div><table><thead><tr><th>代码</th><th>名称</th><th>市场</th><th>行业</th></tr></thead><tbody>${DATA.stock_pool.sample.map(s=>`<tr><td>${s.symbol}</td><td>${s.name}</td><td>${s.market}</td><td>${s.sector}</td></tr>`).join('')}</tbody></table></div><div class="card"><div class="section-title"><h2>股票池</h2><button class="btn secondary" onclick="rebuild()">策略重建</button></div><div class="list">${DATA.pools.map(p=>`<div class="item"><b>${p.name}</b> ${tag(p.visibility,p.visibility==='public'?'green':'gray')}<p class="small muted">${p.description}</p></div>`).join('')}</div></div></div>`; $('factors').innerHTML=`<div class="card"><div class="section-title"><h2>因子排行</h2><div class="form-row">${tag('行情驱动','green')}<button class="btn secondary" onclick="refreshFactors()">刷新因子</button></div></div><table><thead><tr><th>股票</th><th>MACD</th><th>RSI</th><th>动量</th><th>质量</th><th>总分</th><th>质量来源</th></tr></thead><tbody>${DATA.factors.map(f=>`<tr><td>${f.name}<div class="small muted">${f.symbol}</div></td><td>${f.macd}</td><td>${f.rsi}</td><td>${(f.momentum_20d*100).toFixed(2)}%</td><td>${f.quality}</td><td><b>${f.score}</b></td><td>${f.quality_source||'market_or_seed'}</td></tr>`).join('')}</tbody></table></div>`; $('strategies').innerHTML=`<div class="card"><div class="section-title"><h2>策略中心</h2><button class="btn secondary">新建策略</button></div><div class="list">${DATA.strategies.map(s=>`<div class="item"><b>${s.name}</b> ${tag(s.status,s.status==='active'?'green':'amber')} ${tag(s.visibility)}<pre class="json">${JSON.stringify(s.rule,null,2)}</pre>${s.status==='draft'?`<div class="form-row"><button class="btn secondary" onclick="validateStrategy('${s.id}')">回测验证</button><b function renderRiskEventsCard(x){x=x||{};const rows=x.items||[],counts=x.severity_counts||{};return `<div class="card" style="margin-bottom:14px"><div class="section-title"><h2>模拟盘风险事件</h2><div class="form-row">${tag(x.status||'未加载',x.status==='risk'?'red':x.status==='watch'?'amber':x.status==='clear'?'green':'gray')}<button class="btn secondary" onclick="loadRiskEvents()">刷新风险</button></div></div><div id="riskEventsResult">${x.generated_at?`<div class="grid kpis" style="margin-bottom:10px"><div class="item"><div class="k">事件</div><div class="v">${x.event_count??0}</div><div class="sub">组合 ${x.portfolio_with_event_count??0}/${x.portfolio_count??0}</div></div><div class="item"><div class="k">高风险</div><div class="v">${counts.high??0}</div><div class="sub">中 ${counts.medium??0} · 低 ${counts.low??0}</div></div></div><p class="small muted">${x.warning||''}</p><table><thead><tr><th>组合</th><th>事件</th><th>严重度</th><th>标的</th><th>建议</th></tr></thead><tbody>${rows.map(e=>`<tr><td><b>${e.portfolio_name}</b><div class="small muted">${e.portfolio_visibility}</div></td><td>${e.event_type}<div class="small muted">${e.summary}</div></td><td>${tag(e.severity,e.severity==='high'?'red':e.severity==='medium'?'amber':'gray')}</td><td>${e.symbol||'-'}</td><td>${e.action||'-'}</td></tr>`).join('')||'<tr><td colspan="5" class="muted">暂无风险事件。</td></tr>'}</tbody></table>`:'点击“刷新风险”检查模拟盘止损、止盈、回撤、仓位和行情来源。'}</div></div>`}

function renderDataSourceCapabilities(x){x=x||{};const rows=x.items||[];return `<div class="card" style="margin-bottom:14px"><div class="section-title"><h2>数据源能力矩阵</h2>${tag(x.status||'unknown',x.status==='ready'?'green':'amber')}</div><div class="grid kpis" style="margin-bottom:10px"><div class="item"><div class="k">生产可用适配器</div><div class="v">${x.ready_adapter_count??0}/${x.supported_adapter_count??0}</div><div class="sub">默认链路 ${x.default_chain_ready?'ready':'degraded'}</div></div><div class="item"><div class="k">基础信息</div><div class="v">${x.capability_coverage&&x.capability_coverage.stock_basic?'ready':'缺口'}</div><div class="sub">股票池更新能力</div></div><div class="item"><div class="k">历史行情</div><div class="v">${x.capability_coverage&&x.capability_coverage.historical_bars?'ready':'缺口'}</div><div class="sub">回测数据能力</div></div><div class="item"><div class="k">财报</div><div class="v">${x.capability_coverage&&x.capability_coverage.financial_report?'ready':'缺口'}</div><div class="sub">质量因子能力</div></div></div><p class="small muted">${(x.missing&&x.missing.length)?'缺口：'+x.missing.join('；'):'数据源核心能力已覆盖。'} 响应只返回脱敏状态，不返回密钥。</p><table><thead><tr><th>适配器</th><th>状态</th><th>能力</th><th>生产要求</th><th>落库行数</th><th>下一步</th></tr></thead><tbody>${rows.map(r=>`<tr><td><b>${r.label||r.adapter}</b><div class="small muted">${r.adapter} · ${r.operational_default?'默认链路':'替换接口'}</div></td><td>${tag(r.status,r.status==='ready'?'green':r.status==='missing'?'red':'amber')}<div class="small muted">${(r.missing||[]).join('；')||'已满足'}</div></td><td class="small">${(r.capabilities||[]).join('、')}</td><td class="small">${(r.production_requires||[]).join('、')}<div class="small muted">${r.has_secret_ref?'secret_ref 已配置':'secret_ref -'} · tools ${r.prepared_tool_count??0}</div></td><td class="small">行情 ${r.observed_rows&&r.observed_rows.market_bars||0}<br>财报 ${r.observed_rows&&r.observed_rows.financial_reports||0}<br>股票 ${r.observed_rows&&r.observed_rows.stock_universe||0}</td><td>${r.next_action||'-'}<div function renderStrategiesPanel(){const rows=DATA.strategies||[];$('strategies').innerHTML=`${renderStrategyHealth(DATA.strategy_health)}<div class="split"><div class="card"><div class="section-title"><h2>策略列表</h2>${tag('参数可审计','green')}</div><table><thead><tr><th>策略</th><th>状态</th><th>权限</th><th>关键参数</th><th>操作</th></tr></thead><tbody>${rows.map(s=>{const r=s.rule&&s.rule.risk||{},p=s.rule&&s.rule.params||{};return `<tr><td><b>${s.name}</b><div class="small muted">${s.id}</div></td><td>${tag(s.status,s.status==='active'?'green':'amber')}</td><td>${tag(s.visibility,s.visibility==='public'?'green':'gray')}</td><td class="small">模式 ${p.entry_mode||'trend_following'} · 单票 ${(Number(r.max_position_pct||0.1)*100).toFixed(1)}% · 持仓 ${p.max_positions||10} · 动量 ${(Number(p.min_momentum||0)*100).toFixed(1)}% · 质量 ${(Number(p.min_quality||0)*100).toFixed(0)}% · 强弱 ${(Number(p.min_relative_strength||0)*100).toFixed(0)}%/${p.relative_strength_window||60}日 · 宽度 ${(Number(p.min_market_breadth||0)*100).toFixed(0)}% · 行业 ${(Number(p.max_sector_pct||0.35)*100).toFixed(0)}%</td><td><button class="btn secondary" onclick="editStrategy('${s.id}')">编辑</button>${s.status==='draft'?` <button class="btn secondary" onclick="validateStrategy('${s.id}')">验证</button> <button class="btn secondary" onclick="promoteStrategy('${s.id}')">启用</button>`:''}</td></tr>`}).join('')}</tbody></table></div><div class="card"><div class="section-title"><h2>参数编辑</h2>${tag('paper only','amber')}</div><input id="strategyId" type="hidden"><div class="form-row"><input id="strategyName" placeholder="策略名称" style="height:36px;border:1px solid var(--line);border-radius:8px;padding:0 10px;min-width:260px"><select id="strategyVisibility" style="height:36px;border:1px solid var(--line);border-radius:8px;padding:0 10px"><option value="private">private</option><option value="public">public</option></select></div><div class="section-title" style="margin-top:14px"><h2>风险参数</h2></div><div class="form-row">${strategyInput('max_position_pct','单票上限',0.095,0.01)}${strategyInput('stop_loss','止损',0.08,0.01)}${strategyInput('take_profit','止盈',0.35,0.01)}</div><div class="section-title" style="margin-top:14px"><h2>选股与执行</h2></div><div class="form-row"><label class="field">模式<select id="st_entry_mode"><option value="trend_following">trend_following</option><option value="relative_strength_rotation">relative_strength_rotation</option><option value="equal_weight_rotation">equal_weight_rotation</option><option value="equal_weight_buy_hold">equal_weight_buy_hold</option><option value="pool_equal_weight_hold">pool_equal_weight_hold</option></select></label>${strategyInput('max_positions','最大持仓',10,1)}${strategyInput('candidate_top_n','候选数量',5,1)}${strategyInput('min_momentum','动量阈值',0,0.01)}${strategyInput('min_quality','质量阈值',0,0.01)}${strategyInput('min_relative_strength','相对强弱',0,0.01)}${strategyInput('relative_strength_window','强弱窗口',60,1)}${strategyInput('min_market_breadth','市场宽度',0,0.01)}<label class="field">调仓<select id="st_rebalance"><option value="daily">daily</option><option value="weekly">weekly</option><option value="monthly">monthly</option></select></label>${strategyInput('slippage_bps','滑点 bps',8,1)}${strategyInput('volume_participation','成交量参与',0.05,0.001)}${strategyInput('limit_up_pct','涨停阈值',0.099,0.001)}${strategyInput('limit_down_pct','跌停阈值',0.099,0.001)}${strategyInput('max_sector_pct','行业上限',0.35,0.01)}</div><div class="form-row" style="margin-top:12px"><button class="btn" onclick="saveStrategy()">保存策略</button><button class="btn secondary" onclick="runBacktest()">运行回测</button></div><p class="small muted" id="strategyResult">公共策略和平台策略需要管理员身份保存；私有策略只能由 owner 保存。</p><pre class="json" id="strategyRulePreview">{}</pre></div></div>`;if(rows[0])editStrategy(rows[0].id)}
function strategyInput(id,label,value,step){return `<label class="field">${label}<input id="st_${id}" type="number" step="${step}" value="${value}"></label>`}
function editStrategy(id){const s=(DATA.strategies||[]).find(x=>x.id===id);if(!s||!$('strategyId'))return;const r=s.rule&&s.rule.risk||{},p=s.rule&&s.rule.params||{};$('strategyId').value=s.id;$('strategyName').value=s.name;$('strategyVisibility').value=s.visibility;$('st_max_position_pct').value=r.max_position_pct??r.max_single_position_pct??0.095;$('st_stop_loss').value=r.stop_loss??0.08;$('st_take_profit').value=r.take_profit??0.35;$('st_entry_mode').value=p.entry_mode??'trend_following';$('st_max_positions').value=p.max_positions??10;$('st_candidate_top_n').value=p.candidate_top_n??5;$('st_min_momentum').value=p.min_momentum??0;$('st_min_quality').value=p.min_quality??0;$('st_min_relative_strength').value=p.min_relative_strength??0;$('st_relative_strength_window').value=p.relative_strength_window??60;$('st_min_market_breadth').value=p.min_market_breadth??0;$('st_rebalance').value=p.rebalance??'daily';$('st_slippage_bps').value=p.slippage_bps??8;$('st_volume_participation').value=p.volume_participation??0.05;$('st_limit_up_pct').value=p.limit_up_pct??0.099;$('st_limit_down_pct').value=p.limit_down_pct??0.099;$('st_max_sector_pct').value=p.max_sector_pct??0.35;$('strategyRulePreview').textContent=JSON.stringify(s.rule||{},null,2);$('strategyResult').textContent='已载入 '+s.name}
async function saveStrategy(){const id=$('strategyId').value;if(!id){$('strategyResult').textContent='请先选择策略。';return}const risk={max_position_pct:+$('st_max_position_pct').value,stop_loss:+$('st_stop_loss').value,take_profit:$('st_take_profit').value===''?null:+$('st_take_profit').value};const params={entry_mode:$('st_entry_mode').value,max_positions:+$('st_max_positions').value,candidate_top_n:+$('st_candidate_top_n').value,min_momentum:+$('st_min_momentum').value,min_quality:+$('st_min_quality').value,min_relative_strength:+$('st_min_relative_strength').value,relative_strength_window:+$('st_relative_strength_window').value,min_market_breadth:+$('st_min_market_breadth').value,rebalance:$('st_rebalance').value,slippage_bps:+$('st_slippage_bps').value,volume_participation:+$('st_volume_participation').value,limit_up_pct:+$('st_limit_up_pct').value,limit_down_pct:+$('st_limit_down_pct').value,max_sector_pct:+$('st_max_sector_pct').value};const body={name:$('strategyName').value,visibility:$('strategyVisibility').value,risk,params};const current=(DATA.strategies||[]).find(x=>x.id===id);const needsAdmin=body.visibility==='public'||!current||current.visibility==='public'||!current.owner_id;const opts={method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)};const r=needsAdmin?await adminFetch('/api/strategies/'+id,opts):await ziFetch('/api/strategies/'+id,opts);const d=await r.json();$('strategyResult').textContent=JSON.stringify({updated:d.updated,reason:d.reason,strategy:d.strategy&&d.strategy.name});await load();show('strategies')}
function renderPromotionReadiness(x){x=x||{};const cls=x.passed?'green':(x.strategy_health_status==='ready'?'green':'amber');return `<p class="small muted">候选准入：${tag(x.passed?'通过':'需要继续研究',cls)} · 可晋升 ${x.promotable_count??0}/${x.candidate_count??0} · 启用策略 ${x.strategy_health_status||'unknown'} · 下一步 ${x.next_action||'-'}</p>`}
function renderOptimizationHealth(h){h=h||{};const o=h.latest_optimization||{},lo=h.latest_llm_optimization||{},e=h.latest_experiment||{},loop=h.loop||{},cls=h.status==='ready'?'green':'amber';return `<div class="card" style="margin-bottom:14px"><div class="section-title"><h2>策略优化闭环</h2>${tag(h.status||'unknown',cls)}</div><div class="grid kpis" style="margin-bottom:10px"><div class="item"><div class="k">DeepSeek</div><div class="v">${h.deepseek&&h.deepseek.configured?'ready':'缺口'}</div><div class="sub">${lo.age_days==null?(h.deepseek&&h.deepseek.model||'-'):(lo.age_days+' 天前 · '+(lo.model||'-'))}</div></div><div class="item"><div class="k">最近优化</div><div class="v">${o.success?'success':(o.status||'-')}</div><div class="sub">${o.age_days==null?'-':o.age_days+' 天前'} · ${o.model||'-'}</div></div><div class="item"><div class="k">最近验证</div><div class="v">${e.passed==null?'-':(e.passed?'通过':'拒绝')}</div><div class="sub">${h.latest_experiment_age_days==null?'-':h.latest_experiment_age_days+' 天前'}</div></div><div class="item"><div class="k">候选</div><div class="v">${h.promotable_count??0}/${h.candidate_count??0}</div><div class="sub">下一步 ${h.next_action||'-'}</div></div></div><p class="small muted">${(h.reasons&&h.reasons.length)?h.reasons.join('；'):(h.warning||'优化闭环正常。')}</p><table><thead><tr><th>环节</th><th>状态</th><th>说明</th></tr></thead><tbody><tr><td>大模型建议</td><td>${tag(loop.llm_suggested?'已生成':'缺口',loop.llm_suggested?'green':'amber')}</td><td>${lo.id||'-'} · ${lo.model||'-'}</td></tr><tr><td>本地搜索</td><td>${tag(loop.local_search_latest?'最近运行':'非最新',loop.local_search_latest?'green':'gray')}</td><td>${o.id||'-'} · ${o.model||'-'}</td></tr><tr><td>候选验证</td><td>${tag(loop.candidate_validated?'已通过':'待验证',loop.candidate_validated?'green':'amber')}</td><td>${e.id||'-'} · ${e.decision||''}</td></tr><tr><td>启用策略</td><td>${tag(loop.active_strategy_ready?'健康':'观察',loop.active_strategy_ready?'green':'amber')}</td><td>人工晋升需求：${loop.manual_promotion_required?'是':'否'}</td></tr></tbody></table></div>`}
function renderOptimizePanel(){const rows=DATA.strategy_experiments||[];$('optimize').innerHTML=`${renderStrategyHealth(DATA.strategy_health)}${renderOptimizationHealth(DATA.strategy_optimization_loop)}<div class="split"><div class="card"><div class="section-title"><h2>策略优化</h2>${tag('Alpha优先','amber')}</div><div class="form-row"><button class="btn" onclick="runResearchNext()">执行下一步</button><button class="btn secondary" onclick="remediateHealth()">修复健康度</button><button class="btn secondary" onclick="optimizeStrategy()">生成大模型建议</button><button class="btn secondary" onclick="alphaSearch()">Alpha 网格搜索</button></div><p class="small muted" id="optResult">健康度修复会读取 rejected 原因，生成候选策略并立即回测验证；通过后仍需人工提升为启用策略。</p></div><div class="card"><div class="section-title"><h2>优化记录</h2></div><div id="optList" class="list"><div class="item muted">尚未加载</div></div></div></div><div class="card" style="margin-top:14px"><div class="section-title"><h2>可晋升候选</h2><button class="btn secondary" onclick="loadPromotionCandidates()">刷新候选</button></div>${renderPromotionReadiness(DATA.readiness&&DATA.readiness.strategy_promotion_readiness)}<div id="promotionCandidates">${renderPromotionCandidates(DATA.strategy_promotion_candidates||[])}</div></div><div class="card" style="margin-top:14px"><div class="section-title"><h2>修复时间线</h2><button class="btn secondary" onclick="loadRepairTimeline()">刷新时间线</button></div><div id="repairTimeline">${renderRepairTimeline(DATA.strategy_repair_timeline||[])}</div></div><div class="card" style="margin-top:14px"><div class="section-title"><h2>策略实验</h2><button class="btn secondary" onclick="loadExperiments()">刷新实验</button></div><div id="experimentList">${renderExperimentTable(rows)}</div></div>`}
function renderPromotionCandidates(rows){return `<table><thead><tr><th>候选策略</th><th>状态</th><th>Alpha</th><th>样本外</th><th>风险</th><th>操作</th></tr></thead><tbody>${(rows||[]).map(x=>{const m=x.metrics||{};return `<tr><td><b>${x.strategy_name}</b><div class="small muted">${x.strategy_id}</div></td><td>${tag(x.promotable?'可晋升':'阻断',x.promotable?'green':'amber')}<div class="small muted">${(x.blocking_reasons||[]).join('；')}</div></td><td>${m.alpha_return==null?'-':pct(m.alpha_return)}<div class="small muted">基准 ${m.benchmark_return==null?'-':pct(m.benchmark_return)}</div></td><td>${m.out_of_sample_alpha_return==null?'-':pct(m.out_of_sample_alpha_return)}<div class="small muted">${m.out_of_sample_passed===false?'未通过':'通过/待验证'}</div></td><td>Sharpe ${m.sharpe??'-'}<div class="small muted">回撤 ${m.max_drawdown==null?'-':pct(m.max_drawdown)}</div></td><td>${x.promotable?`<button class="btn secondary" onclick="promoteStrategy('${x.strategy_id}')">启用</button>`:'-'}</td></tr>`}).join('')||'<tr><td colspan="6" class="muted">暂无通过验证且仍为草稿的候选策略</td></tr>'}</tbody></table>`}
function renderRepairTimeline(rows){return `<table><thead><tr><th>时间</th><th>动作</th><th>候选/优化</th><th>结论</th><th>Alpha</th><th>原因</th></tr></thead><tbody>${(rows||[]).map(x=>{const s=x.summary||{};return `<tr><td>${x.created_at||'-'}</td><td>${x.action}</td><td class="small">${s.candidate_strategy_id||s.optimization_id||x.target||'-'}</td><td>${s.validation_passed==null?tag(s.health_status||'记录','gray'):tag(s.validation_passed?'通过':'拒绝',s.validation_passed?'green':'red')}<div class="small muted">${s.next_action||''}</div></td><td>${s.alpha_return==null?'-':pct(s.alpha_return)}<div class="small muted">OOS ${s.out_of_sample_alpha==null?'-':pct(s.out_of_sample_alpha)}</div></td><td class="small muted">${(s.comparison_reasons||[]).join('；')}</td></tr>`}).join('')||'<tr><td colspan="6" class="muted">暂无修复记录</td></tr>'}</tbody></table>`}
function renderExperimentTable(rows){return `<table><thead><tr><th>实验</th><th>结论</th><th>收益差</th><th>Alpha差</th><th>Sharpe差</th><th>回撤差</th><th>稳定性</th><th>决策</th></tr></thead><tbody>${(rows||[]).map(x=>{const d=x.comparison&&x.comparison.deltas||{},w=x.metrics&&x.metrics.walk_forward_stability||{};return `<tr><td><b>${x.name}</b><div class="small muted">${x.created_at||''}</div></td><td>${tag(x.passed?'通过':'拒绝',x.passed?'green':'red')}</td><td>${d.total_return==null?'-':(d.total_return*100).toFixed(2)+'%'}</td><td>${d.alpha_return==null?'-':(d.alpha_return*100).toFixed(2)+'%'}</td><td>${d.sharpe==null?'-':d.sharpe}</td><td>${d.max_drawdown==null?'-':(d.max_drawdown*100).toFixed(2)+'%'}</td><td>${w.passed==null?'-':tag(w.passed?'稳定':'不稳定',w.passed?'green':'red')}<div class="small muted">${w.positive_segments==null?'':w.positive_segments+'/4 正收益 · 最差回撤 '+((w.worst_segment_drawdown||0)*100).toFixed(2)+'%'}</div></td><td>${x.decision}<div class="small muted">${(x.comparison&&x.comparison.reasons||[]).join('；')}</div></td></tr>`}).join('')}</tbody></table>`}
function render(){renderKpis();renderOverview();renderSimpleTables();renderStrategiesPanel();renderPaperPanel();renderSourcesPanel();renderOpsPanel();renderUsersPanel();renderOptimizePanel()}
function show(page){document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));$(page).classList.add('active');document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.page===page));$('crumb').textContent=titles[page][0];$('pageTitle').textContent=titles[page][1];$('pageDesc').textContent=titles[page][2]}
async function rebuild(){await ziFetch('/api/pools/rebuild?limit=500',{method:'POST'});await load();show('stocks')}
async function syncStockUniverse(){const r=await ziFetch('/api/stocks/sync',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({limit:500,reset_public_pool:true})});const d=await r.json();const el=$('sourceResult');if(el)el.textContent=JSON.stringify(d);await load();show('stocks')}
async function refreshFactors(){const r=await ziFetch('/api/factors/refresh?limit=500',{method:'POST'});$('sourceResult').textContent=JSON.stringify(await r.json());await load();show('factors')}
async function syncBars(){const r=await ziFetch('/api/data/sync',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({days:900,allow_fallback:true})});$('btResult').textContent=JSON.stringify(await r.json());await load();show('backtest')}
async function strictSyncBars(){const r=await ziFetch('/api/data/sync',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({days:900,allow_fallback:false})});const text=JSON.stringify(await r.json());const el=$('sourceResult');if(el)el.textContent=text;await load();show('sources')}
async function bootstrapRealData(){const r=await ziFetch('/api/data/bootstrap-real',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({days:180,limit:10})});const d=await r.json();const el=$('sourceResult');if(el)el.textContent=JSON.stringify({symbols:d.symbols,market:d.market,financials:d.financials,readiness:d.readiness&&d.readiness.status});await load();show('ops')}
async function syncFinancials(){const r=await ziFetch('/api/financials/sync',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({limit:30,allow_fallback:false})});const text=JSON.stringify(await r.json());const el=$('sourceResult');if(el)el.textContent=text;await load();show('sources')}
async function prepareSource(){const r=await ziFetch('/api/data-sources/qveris/prepare',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({})});const text=JSON.stringify(await r.json());const el=$('sourceResult');if(el)el.textContent=text;await load();show('sources')}
function newSource(){if(!$('sourceName'))return;$('sourceId').value='';$('sourceName').value='';$('sourceAdapter').value='qveris';$('sourcePriority').value=100;$('sourceSecretRef').value='';$('sourceEnabled').checked=true;$('sourceConfig').value='{}';$('sourceEditResult').textContent='正在新建数据源配置。'}
function editSource(id){const d=(DATA.data_sources||[]).find(x=>x.id===id);if(!d||!$('sourceName'))return;$('sourceId').value=d.id;$('sourceName').value=d.name;$('sourceAdapter').value=d.adapter;$('sourcePriority').value=d.priority;$('sourceSecretRef').value=d.secret_ref||'';$('sourceEnabled').checked=!!d.enabled;$('sourceConfig').value=JSON.stringify(d.config||{},null,2);$('sourceEditResult').textContent='已载入 '+d.name+'，显示内容已脱敏。'}
async function saveSource(){let config={};try{config=JSON.parse($('sourceConfig').value||'{}')}catch(e){$('sourceEditResult').textContent='配置 JSON 格式错误：'+e.message;return}const body={id:$('sourceId').value||null,name:$('sourceName').value,adapter:$('sourceAdapter').value,enabled:$('sourceEnabled').checked,priority:+$('sourcePriority').value||100,secret_ref:$('sourceSecretRef').value||null,config};const r=await ziFetch('/api/data-sources',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});const d=await r.json();$('sourceEditResult').textContent=JSON.stringify({saved:d.saved,reason:d.reason,stripped_secret_keys:d.stripped_secret_keys||[]});await load();show('sources')}
async function toggleSource(id,enabled){const r=await ziFetch('/api/data-sources/'+id+'/enabled',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({enabled})});const d=await r.json();const el=$('sourceEditResult')||$('sourceResult');if(el)el.textContent=JSON.stringify({updated:d.updated,reason:d.reason});await load();show('sources')}
async function runBacktest(params={}){const body={days:900,initial_cash:100000,max_symbols:50,...params};const r=await ziFetch('/api/backtests/run',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});$('btResult').textContent=JSON.stringify(await r.json());await load();show('backtest');loadBacktests()}
async function loadBacktests(){const r=await fetch('/api/backtests');const d=await r.json();$('btList').innerHTML=d.items.map(x=>{const m=x.metrics||{},o=m.out_of_sample||{};return `<div class="item"><b>${x.name}</b><p class="small muted">${x.start_date} ~ ${x.end_date}</p><p>收益 ${((m.total_return||0)*100).toFixed(2)}% · 基准 ${((m.benchmark_return||0)*100).toFixed(2)}% · Alpha ${((m.alpha_return||0)*100).toFixed(2)}% · 样本外 ${o.return==null?'-':(o.return*100).toFixed(2)+'%'} · 样本外Alpha ${o.alpha_return==null?'-':(o.alpha_return*100).toFixed(2)+'%'} · Sharpe ${m.sharpe}</p><button class="btn secondary" onclick="loadBacktestDetail('${x.id}')">查看详情</button></div>`}).join('')||'<div class="item muted">暂无回测</div>'}
async function loadBacktestDetail(id){const r=await fetch('/api/backtests/'+id);const d=await r.json();const m=d.run.metrics||{};$('btResult').textContent=JSON.stringify({benchmark:m.benchmark,alpha_return:m.alpha_return,out_of_sample:m.out_of_sample,walk_forward_stability:m.walk_forward_stability,trades:d.trades.slice(0,8),summary_by_symbol:d.summary_by_symbol.slice(0,8),excluded_symbols:m.excluded_symbols||[]})}
async function loadCoverage(params={}){const r=await ziFetch('/api/data/coverage',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({limit:30,...params})});const d=await r.json();$('sourceResult').textContent=JSON.stringify((d.items||[]).slice(0,10));show('sources')}
async function loadDataProvenance(){const r=await fetch('/api/data/provenance');const d=await r.json();DATA.data_provenance=d;const el=$('provenanceResult');if(el){const tmp=document.createElement('div');tmp.innerHTML=renderDataProvenanceCard(d);const body=tmp.querySelector('#provenanceResult');if(body)el.innerHTML=body.innerHTML}const res=$('sourceResult');if(res)res.textContent=JSON.stringify({status:d.status,market_sources:(d.market_sources||[]).length,financial_sources:(d.financial_sources||[]).length,fallback_bar_ratio:d.status_detail&&d.status_detail.fallback_bar_ratio})}
async function loadJobRuns(){const r=await adminFetch('/api/admin/job-runs?limit=20');const d=await r.json();const el=$('jobRunResult');if(el)el.innerHTML=`<table><thead><tr><th>任务</th><th>类型</th><th>状态</th><th>开始</th><th>耗时</th><th>诊断</th><th>结果</th></tr></thead><tbody>${(d.items||[]).map(x=>`<tr><td>${x.job_name}</td><td>${x.job_type}</td><td>${tag(x.status,x.status==='success'?'green':x.status==='failed'?'red':'amber')}</td><td>${x.started_at||'-'}</td><td>${x.duration_ms==null?'-':x.duration_ms+' ms'}</td><td>${jobDiag(x.diagnostic)}</td><td><pre class="json">${JSON.stringify(x.result||{},null,2)}</pre></td></tr>`).join('')}</tbody></table>`}
async function loadAcceptance(){const r=await adminFetch('/api/admin/production-acceptance');const d=await r.json();DATA.production_acceptance=d;const el=$('acceptanceResult');if(el){const tmp=document.createElement('div');tmp.innerHTML=renderAcceptanceCard(d);const body=tmp.querySelector('#acceptanceResult');if(body)el.innerHTML=body.innerHTML}const res=$('sourceResult');if(res)res.textContent=JSON.stringify({decision:d.decision,status:d.status,required:d.required_passed+'/'+d.required_total,residual_risks:(d.residual_risks||[]).length})}
async function loadAuditLogs(){const r=await adminFetch('/api/admin/audit-logs?limit=30');const d=await r.json();DATA.audit_logs=d.items||[];const el=$('auditLogResult');if(el)el.innerHTML=renderAuditLogsTable(DATA.audit_logs);const res=$('sourceResult');if(res)res.textContent=JSON.stringify({audit_logs:d.count,limit:d.limit})}
async function runJob(id){const r=await adminFetch('/api/admin/jobs/'+id+'/run',{method:'POST'});const d=await r.json();$('sourceResult').textContent=JSON.stringify({status:d.status,run_id:d.run_id,result:d.result||d.error});await load();show('ops');await loadJobRuns()}
async function runDueJobs(){const r=await adminFetch('/api/admin/jobs/run-due?limit=5',{method:'POST'});const d=await r.json();const el=$('opsJobResult')||$('sourceResult');if(el)el.textContent=JSON.stringify({due_count:d.due_count,ran_count:d.ran_count,skipped_due_count:d.skipped_due_count,results:(d.results||[]).map(x=>({job_type:x.job_type,status:x.status,run_id:x.run_id,error:x.error}))});await load();show('ops');await loadJobRuns()}
async function resetStaleJobs(){const r=await adminFetch('/api/admin/jobs/reset-stale?hours=2',{method:'POST'});const d=await r.json();const el=$('opsJobResult')||$('sourceResult');if(el)el.textContent=JSON.stringify({runs:d.runs,jobs:d.jobs,timeout_hours:d.timeout_hours});await load();show('ops');await loadJobRuns()}
async function resetFailedJobs(){const r=await adminFetch('/api/admin/jobs/reset-failed?scheduled_only=true',{method:'POST'});const d=await r.json();const el=$('opsJobResult')||$('sourceResult');if(el)el.textContent=JSON.stringify({jobs:d.jobs,scheduled_only:d.scheduled_only});await load();show('ops');await loadJobRuns()}
async function loadUsers(){const r=await adminFetch('/api/admin/users');const d=await r.json();window.ZI_USERS=d.items||[];const el=$('userList');if(el)el.innerHTML=renderUserTable(window.ZI_USERS);const res=$('userResult');if(res)res.textContent=JSON.stringify({count:window.ZI_USERS.length,roles:d.roles})}
function newUser(){window.ZI_USERS=window.ZI_USERS||[];$('editUserId').value='';$('editUserEmail').value='';$('editUserName').value='';$('editUserRole').value='researcher';$('editUserActive').checked=true;$('userResult').textContent='正在新建用户。'}
function editUser(id){const u=(window.ZI_USERS||[]).find(x=>x.id===id);if(!u)return;$('editUserId').value=u.id;$('editUserEmail').value=u.email;$('editUserName').value=u.name;$('editUserRole').value=u.role;$('editUserActive').checked=!!u.active;$('userResult').textContent='已载入 '+u.email}
async function saveUser(){const body={id:$('editUserId').value||null,email:$('editUserEmail').value,name:$('editUserName').value,role:$('editUserRole').value,active:$('editUserActive').checked};const r=await adminFetch('/api/admin/users',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});const d=await r.json();$('userResult').textContent=JSON.stringify({saved:d.saved,reason:d.reason,user:d.user&&d.user.email});await loadUsers()}
async function toggleUser(id,active){const r=await adminFetch('/api/admin/users/'+id+'/active',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({active})});const d=await r.json();$('userResult').textContent=JSON.stringify({updated:d.updated,reason:d.reason,user:d.user&&d.user.email});await loadUsers()}
async function optimizeStrategy(){const r=await ziFetch('/api/strategies/optimize',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({})});$('optResult').textContent=JSON.stringify(await r.json());await load();show('optimize');loadOptimizations()}
async function alphaSearch(params={}){const body={days:900,initial_cash:100000,max_symbols:20,max_trials:6,...params};const r=await ziFetch('/api/strategies/alpha-search',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});const d=await r.json();const b=d.best||{},v=d.validation||{};$('optResult').textContent=JSON.stringify({searched:d.searched,optimization_id:d.optimization_id,best_strategy_id:d.best_strategy_id,score:b.score,metrics:b.metrics,changes:b.changes,validation:{passed:v.passed,experiment_id:v.experiment_id,decision:v.decision},next_action:d.next_action,params:body});await load();show('optimize');loadOptimizations();loadExperiments();loadRepairTimeline();loadPromotionCandidates()}
async function remediateHealth(params={}){const body={days:900,initial_cash:100000,max_symbols:40,...params};const r=await ziFetch('/api/strategies/remediate-health',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});const d=await r.json();const v=d.validation||{};$('optResult').textContent=JSON.stringify({remediated:d.remediated,reason:d.reason,health:d.strategy_health_before&&d.strategy_health_before.status,optimization_id:d.optimization&&d.optimization.id,candidate_strategy_id:d.candidate&&d.candidate.strategy_id,passed:v.passed,decision:v.decision,next_action:d.next_action,comparison:v.comparison,params:body});await load();show('optimize');loadOptimizations();loadExperiments();loadRepairTimeline();loadPromotionCandidates()}
async function runResearchNext(params={}){const body={days:900,initial_cash:100000,max_symbols:40,max_trials:8,...params};const r=await ziFetch('/api/strategies/research-next',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});const d=await r.json();const v=d.result&&d.result.validation||{},c=d.result&&d.result.candidate||{};$('optResult').textContent=JSON.stringify({ran:d.ran,action:d.plan&&d.plan.action,reason:d.plan&&d.plan.reason,before:d.readiness_before,after:d.readiness_after,result_summary:d.result&&{remediated:d.result.remediated,searched:d.result.searched,tightened:d.result.tightened,best_strategy_id:d.result.best_strategy_id,candidate_strategy_id:c.strategy_id,validation_passed:v.passed,experiment_id:v.experiment_id,decision:v.decision,next_action:d.result.next_action},params:body});await load();show('optimize');loadOptimizations();loadExperiments();loadRepairTimeline();loadPromotionCandidates()}
async function runRepairAction(index){const plan=(DATA.strategy_health&&DATA.strategy_health.repair_plan||[])[index];if(!plan)return;const params=plan.params||{};const el=$('sourceResult');if(el)el.textContent='执行修复动作：'+plan.title+' '+JSON.stringify(params);if(plan.action==='remediate_health'){show('optimize');await remediateHealth(params);return}if(plan.action==='alpha_search'){show('optimize');await alphaSearch(params);return}if(plan.action==='tighten_signal_quality'){show('optimize');await optimizeStrategy();return}if(plan.action==='run_backtest'){show('backtest');await runBacktest(params);return}if(plan.action==='loosen_or_expand_universe'){await loadCoverage(params);return}if(plan.action==='paper_observe'){show('paper');await rebalancePlan(false);return}if(el)el.textContent='该修复动作需要人工处理：'+JSON.stringify(plan)}
async function loadOptimizations(){const r=await fetch('/api/optimizations');const d=await r.json();$('optList').innerHTML=d.items.map(x=>`<div class="item"><b>${x.model}</b> ${tag(x.status,x.status==='success'?'green':'amber')}<pre class="json">${JSON.stringify(x.result,null,2)}</pre><button class="btn secondary" onclick="applyOptimization('${x.id}')">生成候选策略</button></div>`).join('')||'<div class="item muted">暂无优化记录</div>'}
async function loadExperiments(){const r=await fetch('/api/strategy-experiments?limit=30');const d=await r.json();const el=$('experimentList');if(el)el.innerHTML=renderExperimentTable(d.items||[])}
async function loadRepairTimeline(){const r=await fetch('/api/strategies/repair-timeline?limit=30');const d=await r.json();const el=$('repairTimeline');if(el)el.innerHTML=renderRepairTimeline(d.items||[])}
async function loadPromotionCandidates(){const r=await fetch('/api/strategies/promotion-candidates?limit=20');const d=await r.json();const el=$('promotionCandidates');if(el)el.innerHTML=renderPromotionCandidates(d.items||[])}
async function applyOptimization(id){const r=await ziFetch('/api/optimizations/'+id+'/apply',{method:'POST'});const d=await r.json();$('optResult').textContent=JSON.stringify(d);if(d.strategy_id) await validateStrategy(d.strategy_id);await load();show('strategies')}
async function validateStrategy(id){const r=await ziFetch('/api/strategies/'+id+'/validate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({days:900,initial_cash:100000,max_symbols:50})});const d=await r.json();const el=$('optResult')||$('sourceResult');if(el){const c=d.comparison||{};el.textContent=JSON.stringify({passed:d.passed,decision:d.decision,experiment_id:d.experiment_id,backtest_run_id:d.backtest_run_id,baseline_run_id:d.baseline_run_id,deltas:c.deltas,reasons:c.reasons})}await loadExperiments();await loadPromotionCandidates();return d}
async function promoteStrategy(id){const r=await ziFetch('/api/strategies/'+id+'/promote',{method:'POST'});const d=await r.json();const el=$('optResult')||$('sourceResult');if(el)el.textContent=JSON.stringify(d);await load();show('strategies')}
function renderPortfolioDetail(d){const p=d.portfolio||{},perf=d.performance||{},positions=d.positions||[],snaps=d.snapshots||[],orders=d.orders||[];return `<div class="kpis"><div class="kpi"><span>总权益</span><b>¥${fmt(p.total_equity||0)}</b></div><div class="kpi"><span>总收益</span><b>${((perf.total_return||0)*100).toFixed(2)}%</b></div><div class="kpi"><span>日收益</span><b>${perf.daily_return==null?'-':(perf.daily_return*100).toFixed(2)+'%'}</b></div><div class="kpi"><span>最大回撤</span><b>${((perf.max_drawdown||0)*100).toFixed(2)}%</b></div></div><table><thead><tr><th>股票</th><th>股数</th><th>成本</th><th>现价</th><th>市值</th><th>浮盈</th></tr></thead><tbody>${positions.map(x=>`<tr><td>${x.name}<div class="small muted">${x.symbol} · ${x.price_source||''}</div></td><td>${x.shares}</td><td>${x.avg_cost}</td><td>${x.last_price}</td><td>¥${fmt(x.market_value||0)}</td><td>${fmt(x.unrealized_pnl||0)}</td></tr>`).join('')||'<tr><td colspan="6" class="muted">暂无持仓</td></tr>'}</tbody></table><div class="section-title" style="margin-top:12px"><h2>最近订单</h2><span class="small muted">${orders.length} 条 · 仅纸面</span></div><table><thead><tr><th>时间</th><th>动作</th><th>股票</th><th>股数</th><th>价格</th><th>金额</th><th>风控证据</th></tr></thead><tbody>${orders.slice(0,10).map(x=>{const risk=x.risk||{},checks=risk.checks||[];return `<tr><td>${x.created_at||'-'}</td><td>${tag(x.side,x.side==='buy'?'red':'amber')}</td><td>${x.symbol}<div class="small muted">${x.price_source||''} ${x.paper_only?'· paper only':''}</div></td><td>${x.shares}</td><td>${x.price}</td><td>¥${fmt(x.amount||x.price*x.shares||0)}<div class="small muted">费 ${fmt(x.fee||0)}</div></td><td>${tag(risk.accepted?'通过':'缺失',risk.accepted?'green':'amber')}<div class="small muted">${checks.map(c=>`${c.name}:${c.value}/${c.limit}`).join('；')||'历史订单无风险快照'}</div></td></tr>`}).join('')||'<tr><td colspan="7" class="muted">暂无订单</td></tr>'}</tbody></table><div class="section-title" style="margin-top:12px"><h2>最近快照</h2><span class="small muted">${snaps.length} 条</span></div><table><thead><tr><th>时间</th><th>来源</th><th>现金</th><th>市值</th><th>权益</th><th>总收益</th><th>回撤</th></tr></thead><tbody>${snaps.slice(0,10).map(x=>`<tr><td>${x.snapshot_at||'-'}</td><td>${x.source}</td><td>¥${fmt(x.cash||0)}</td><td>¥${fmt(x.market_value||0)}</td><td>¥${fmt(x.total_equity||0)}</td><td>${x.total_return==null?'-':(x.total_return*100).toFixed(2)+'%'}</td><td>${x.max_drawdown==null?'-':(x.max_drawdown*100).toFixed(2)+'%'}</td></tr>`).join('')||'<tr><td colspan="7" class="muted">暂无快照</td></tr>'}</tbody></table>`}
async function loadPortfolio(){const p=DATA.portfolios[0];if(!p){$('portfolioResult').textContent='暂无模拟盘';return}const r=await fetch('/api/portfolios/'+p.id);const d=await r.json();$('portfolioResult').innerHTML=renderPortfolioDetail(d);$('orderResult').textContent=JSON.stringify({total_equity:d.portfolio&&d.portfolio.total_equity,positions:(d.positions||[]).length,snapshots:(d.snapshots||[]).length})}
async function snapshotPortfolio(){const p=DATA.portfolios[0];if(!p){$('portfolioResult').textContent='暂无模拟盘';return}const r=await ziFetch('/api/portfolios/'+p.id+'/snapshot',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({source:'manual_ui'})});const d=await r.json();$('orderResult').textContent=JSON.stringify({recorded:d.recorded,snapshot:d.snapshot});await loadPortfolio()}
async function riskCheck(){const p=DATA.portfolios[0];const r=await ziFetch('/api/risk/portfolio/'+p.id,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({symbol:$('orderSymbol').value,side:'buy',shares:+$('orderShares').value})});$('orderResult').textContent=JSON.stringify(await r.json())}
async function loadRiskEvents(){const r=await fetch('/api/risk/events?limit=100');const d=await r.json();DATA.paper_risk_events=d;const el=$('riskEventsResult');if(el){const tmp=document.createElement('div');tmp.innerHTML=renderRiskEventsCard(d);const body=tmp.querySelector('#riskEventsResult');if(body)el.innerHTML=body.innerHTML}const res=$('orderResult')||$('sourceResult');if(res)res.textContent=JSON.stringify({status:d.status,event_count:d.event_count,severity_counts:d.severity_counts})}
async function paperOrder(side='buy'){const p=DATA.portfolios[0];const r=await ziFetch('/api/portfolios/order',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({portfolio_id:p.id,symbol:$('orderSymbol').value,side,shares:+$('orderShares').value})});$('orderResult').textContent=JSON.stringify(await r.json());await load();show('paper')}
function renderRebalanceTable(d){const rows=d.recommendations||[],h=d.strategy_health||{},g=d.execution_guard||{};const block=d.execution_blocked?`<div class="item" style="border-color:#fecaca;background:#fff7f7"><b>纸面执行已阻断</b> ${tag(h.status||'unknown','red')}<p>${(g.details||h.reasons||[]).join('；')}</p><p class="small muted">请先运行大模型优化或 Alpha 网格搜索，通过回测验证后再启用新策略。</p></div>`:'';return `<p class="small muted">${d.warning}</p>${block}<p>策略：${d.strategy_name||'-'} ${tag(h.status||'unknown',h.status==='ready'?'green':h.status==='rejected'?'red':'amber')} · 总资产 ¥${fmt(d.equity||0)} · 目标 ${((d.target_symbols||[]).slice(0,8)).join('、')}</p><table><thead><tr><th>动作</th><th>股票</th><th>股数</th><th>价格</th><th>金额</th><th>理由</th><th>风控</th></tr></thead><tbody>${rows.map(x=>`<tr><td>${tag(x.side,x.side==='buy'?'red':x.side==='sell'?'amber':'gray')}</td><td>${x.symbol}<div class="small muted">${x.price_source||''}</div></td><td>${x.shares}</td><td>${x.price}</td><td>¥${fmt(x.amount||0)}</td><td>${x.reason}</td><td>${tag(x.risk&&x.risk.accepted?'通过':'拒绝',x.risk&&x.risk.accepted?'green':'red')}</td></tr>`).join('')}</tbody></table>${d.executed_orders&&d.executed_orders.length?`<pre class="json">${JSON.stringify(d.executed_orders,null,2)}</pre>`:''}`}
async function rebalancePlan(execute=false){const p=DATA.portfolios[0];if(!p){$('rebalanceResult').textContent='暂无模拟盘';return}const r=await ziFetch('/api/portfolios/'+p.id+'/rebalance',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({execute})});const d=await r.json();$('rebalanceResult').innerHTML=renderRebalanceTable(d);if(execute){await load();renderPaperPanel();$('rebalanceResult').innerHTML=renderRebalanceTable(d);show('paper')}}
async function refreshRecommendationPanel(){const [r1,r2]=await Promise.all([fetch('/api/recommendations/realtime?limit=10'),fetch('/api/recommendations/yesterday-review?limit=10')]);DATA.realtime_recommendations=await r1.json();DATA.yesterday_review=await r2.json();renderOverview();show('overview')}
async function analyzeStock(){const symbol=($('analysisSymbol')&&$('analysisSymbol').value||'').trim();if(!symbol)return;const r=await fetch('/api/stocks/analyze?symbol='+encodeURIComponent(symbol));const d=await r.json();const el=$('stockAnalysisResult');if(!el)return;if(!d.found){el.innerHTML=`<div class="item">${tag('未找到','red')} ${d.reason||''}</div>`;return}const rec=d.recommendation||{},quote=d.latest_quote||{},fin=d.financial||{};el.innerHTML=`<div class="item"><div class="section-title"><b>${d.stock.name} ${d.stock.symbol}</b>${tag(rec.action||'unknown',rec.action==='BUY_WATCH'?'red':rec.action==='OBSERVE'?'amber':'gray')}</div><p>${rec.reason||''}</p><p class="small muted">行业 ${d.stock.sector} · 最新 ${quote.close??'-'} · 日涨跌 ${quote.daily_return==null?'-':(quote.daily_return*100).toFixed(2)+'%'} · 来源 ${quote.source||'-'}</p><p class="small muted">财报 ${fin.report_date||'-'} · ROE ${fin.roe??'-'} · 营收 ${fin.revenue??'-'} · 净利 ${fin.net_profit??'-'}</p><p class="small muted">策略：${(rec.strategy_tags||[]).join(' / ')} · 风险：${(d.risk_findings||[]).join('；')||'未发现高优先级风险'}</p></div>`}
async function sendFeishuSignal(dryRun=true){const r=await ziFetch('/api/signals/feishu',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({dry_run:dryRun,limit:8})});const d=await r.json();const el=$('sourceResult');if(el)el.textContent=JSON.stringify({sent:d.sent,dry_run:d.dry_run,recommendation_count:d.recommendation_count,review_status:d.review_status,message_preview:d.message_preview&&d.message_preview.slice(0,500)});if($('stockAnalysisResult'))$('stockAnalysisResult').innerHTML=`<div class="item"><b>飞书信号${dryRun?'预览':'发送'}</b><pre class="json">${JSON.stringify(d,null,2)}</pre></div>`}
document.querySelectorAll('.nav button').forEach(b=>b.onclick=()=>{show(b.dataset.page); if(b.dataset.page==='backtest') loadBacktests(); if(b.dataset.page==='optimize'){loadOptimizations();loadExperiments();loadRepairTimeline();loadPromotionCandidates()} if(b.dataset.page==='users') loadUsers();});$('refreshBtn').onclick=load;$('rebuildBtn').onclick=rebuild;load();
</script>
</body>
</html>
